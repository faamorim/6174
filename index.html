<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>6174 — Kaprekar's Routine Visualizer</title>
    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body>
    <h1>6174</h1>
    <p class="subtitle">Visualizer for Kaprekar's routine</p>

    <div class="digit-tabs">
      <button class="digit-tabs__button" data-digits="3">3 digits</button>
      <button class="digit-tabs__button is-active" data-digits="4">4 digits</button>
    </div>

    <nav class="view-tabs">
      <button class="view-tabs__button" data-view="steps">Steps</button>
      <button class="view-tabs__button" data-view="bars">Distribution</button>
      <button class="view-tabs__button" data-view="numberline">Number Line</button>
      <button class="view-tabs__button" data-view="curiosities">Curiosities</button>
    </nav>

    <div class="controls">
      <input type="text" id="number-input" inputmode="numeric" />
      <button id="go-button">Go</button>
    </div>

    <section id="view-steps" class="view">
      <div id="steps-output"></div>
    </section>

    <section id="view-bars" class="view" hidden>
      <canvas id="bars-canvas" width="640" height="360"></canvas>
      <canvas id="imagesets-canvas" width="640" height="200"></canvas>

      <div class="heatmap-block">
        <p class="heatmap-block__title">Step count — full range</p>
        <div class="heatmap-strip">
          <canvas id="steps-data-canvas"></canvas>
        </div>
        <canvas id="steps-label-canvas" class="heatmap-label"></canvas>
      </div>

      <div class="heatmap-block">
        <p class="heatmap-block__title"><span id="level-display"></span></p>
        <input type="range" id="level-slider" min="0" max="7" value="1" step="1" class="heatmap-slider" />
        <div class="heatmap-strip">
          <canvas id="level-data-canvas"></canvas>
        </div>
        <canvas id="level-label-canvas" class="heatmap-label"></canvas>
      </div>
    </section>

    <section id="view-curiosities" class="view" hidden>
      <div id="curiosities-output"></div>
    </section>

    <section id="view-numberline" class="view" hidden>
      <div class="cycle-controls">
        <button id="cycle-button">Cycle</button>
        <label for="cycle-speed">Speed: <span id="cycle-speed-value">10</span>/sec</label>
        <input type="range" id="cycle-speed" min="1" max="2000" step="1" value="10" />
      </div>
      <canvas id="numberline-canvas" width="800" height="220"></canvas>
    </section>

    <script src="src/kaprekar.js"></script>
    <script src="src/views/steps.js"></script>
    <script src="src/views/bars.js"></script>
    <script src="src/views/numberline.js"></script>
    <script src="src/views/curiosities.js"></script>
    <script src="src/main.js"></script>
  </body>
</html>
